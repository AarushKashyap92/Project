<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labour Hiring Login</title>

    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url("labour_img.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            backdrop-filter: blur(8px);
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #d2edfc;
        }

        .login-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .login-box input:focus {
            border-color: #d2edfc;
        }

        .login-box button {
            width: 95%;
            padding: 12px;
            background: #d2edfc;
            color: #1187c7;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-box button:hover {
            background: #5495b9;
            color: #d2edfc;
        }

        .login-box p {
            margin-top: 15px;
            font-size: 14px;
            color: #5495b9;
        }

        .login-box a {
            color: #d2edfc;
            text-decoration: none;
            font-weight: bold;
        }

        .login-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <form>
            <input type="text" placeholder="Enter Username" required>
            <input type="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

            <p>Don't have an account? <a href="register.html">Register</a></p>
        </form>
    </div>

</body>
</html>
